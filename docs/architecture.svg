<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="'Comic Sans MS', 'Segoe UI', sans-serif">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="3" dy="3" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="1200" height="800" fill="#fefefe" stroke="#e0e0e0" stroke-width="2" rx="10"/>

  <!-- 标题区域 -->
  <g transform="translate(600, 60)">
    <rect x="-280" y="-35" width="560" height="70" fill="#6C5CE7" rx="15" filter="url(#shadow)"/>
    <text x="0" y="8" text-anchor="middle" fill="white" font-size="28" font-weight="bold">🎮 Infinite-Genre-Instance-Dungeons</text>
    <text x="0" y="35" text-anchor="middle" fill="#DFE6E9" font-size="14">无限流副本记忆系统 — 让你的AI真正记住每一次冒险</text>
  </g>

  <!-- 输入层 -->
  <g transform="translate(150, 160)">
    <text x="0" y="0" fill="#2d3436" font-size="18" font-weight="bold">📥 输入层</text>

    <!-- 用户对话 -->
    <g transform="translate(0, 25)">
      <rect x="0" y="0" width="120" height="60" fill="#74B9FF" rx="8" stroke="#0984e3" stroke-width="2" filter="url(#shadow)"/>
      <text x="60" y="25" text-anchor="middle" fill="white" font-size="14">💬 用户对话</text>
      <text x="60" y="45" text-anchor="middle" fill="#dfe6e9" font-size="11">日常聊天</text>
    </g>

    <!-- 场景图片 -->
    <g transform="translate(140, 25)">
      <rect x="0" y="0" width="120" height="60" fill="#74B9FF" rx="8" stroke="#0984e3" stroke-width="2" filter="url(#shadow)"/>
      <text x="60" y="25" text-anchor="middle" fill="white" font-size="14">🖼️ 场景图片</text>
      <text x="60" y="45" text-anchor="middle" fill="#dfe6e9" font-size="11">视觉记忆</text>
    </g>

    <!-- 角色互动 -->
    <g transform="translate(280, 25)">
      <rect x="0" y="0" width="120" height="60" fill="#74B9FF" rx="8" stroke="#0984e3" stroke-width="2" filter="url(#shadow)"/>
      <text x="60" y="25" text-anchor="middle" fill="white" font-size="14">🎭 角色互动</text>
      <text x="60" y="45" text-anchor="middle" fill="#dfe6e9" font-size="11">NPC对话</text>
    </g>

    <!-- 剧情选择 -->
    <g transform="translate(420, 25)">
      <rect x="0" y="0" width="120" height="60" fill="#74B9FF" rx="8" stroke="#0984e3" stroke-width="2" filter="url(#shadow)"/>
      <text x="60" y="25" text-anchor="middle" fill="white" font-size="14">⚡ 剧情选择</text>
      <text x="60" y="45" text-anchor="middle" fill="#dfe6e9" font-size="11">关键决策</text>
    </g>

    <!-- 副本经历 -->
    <g transform="translate(560, 25)">
      <rect x="0" y="0" width="120" height="60" fill="#74B9FF" rx="8" stroke="#0984e3" stroke-width="2" filter="url(#shadow)"/>
      <text x="60" y="25" text-anchor="middle" fill="white" font-size="14">🌙 副本经历</text>
      <text x="60" y="45" text-anchor="middle" fill="#dfe6e9" font-size="11">完整冒险</text>
    </g>
  </g>

  <!-- 核心处理层 -->
  <g transform="translate(150, 280)">
    <text x="0" y="0" fill="#2d3436" font-size="18" font-weight="bold">🧠 核心处理</text>

    <!-- 话题分析 -->
    <g transform="translate(0, 25)">
      <rect x="0" y="0" width="120" height="60" fill="#00B894" rx="8" stroke="#00cec9" stroke-width="2" filter="url(#shadow)"/>
      <text x="60" y="25" text-anchor="middle" fill="white" font-size="14">📊 话题分析</text>
      <text x="60" y="45" text-anchor="middle" fill="#dfe6e9" font-size="11">识别主题</text>
    </g>

    <!-- 记忆形成 -->
    <g transform="translate(140, 25)">
      <rect x="0" y="0" width="120" height="60" fill="#00B894" rx="8" stroke="#00cec9" stroke-width="2" filter="url(#shadow)"/>
      <text x="60" y="25" text-anchor="middle" fill="white" font-size="14">📝 记忆形成</text>
      <text x="60" y="45" text-anchor="middle" fill="#dfe6e9" font-size="11">结构化存储</text>
    </g>

    <!-- 关系图谱 -->
    <g transform="translate(280, 25)">
      <rect x="0" y="0" width="120" height="60" fill="#00B894" rx="8" stroke="#00cec9" stroke-width="2" filter="url(#shadow)"/>
      <text x="60" y="25" text-anchor="middle" fill="white" font-size="14">🔗 关系图谱</text>
      <text x="60" y="45" text-anchor="middle" fill="#dfe6e9" font-size="11">概念连接</text>
    </g>

    <!-- 人物印象 -->
    <g transform="translate(420, 25)">
      <rect x="0" y="0" width="120" height="60" fill="#00B894" rx="8" stroke="#00cec9" stroke-width="2" filter="url(#shadow)"/>
      <text x="60" y="25" text-anchor="middle" fill="white" font-size="14">👤 人物印象</text>
      <text x="60" y="45" text-anchor="middle" fill="#dfe6e9" font-size="11">好感度追踪</text>
    </g>

    <!-- 时间记忆 -->
    <g transform="translate(560, 25)">
      <rect x="0" y="0" width="120" height="60" fill="#00B894" rx="8" stroke="#00cec9" stroke-width="2" filter="url(#shadow)"/>
      <text x="60" y="25" text-anchor="middle" fill="white" font-size="14">⏰ 时间记忆</text>
      <text x="60" y="45" text-anchor="middle" fill="#dfe6e9" font-size="11">事件序列</text>
    </g>
  </g>

  <!-- 存储层 -->
  <g transform="translate(150, 400)">
    <text x="0" y="0" fill="#2d3436" font-size="18" font-weight="bold">💾 存储层</text>

    <!-- SQLite -->
    <g transform="translate(0, 25)">
      <rect x="0" y="0" width="120" height="60" fill="#FDCB6E" rx="8" stroke="#fdcb6e" stroke-width="2" filter="url(#shadow)"/>
      <text x="60" y="25" text-anchor="middle" fill="#2d3436" font-size="14">🗄️ SQLite</text>
      <text x="60" y="45" text-anchor="middle" fill="#636e72" font-size="11">结构化记忆</text>
    </g>

    <!-- LanceDB -->
    <g transform="translate(140, 25)">
      <rect x="0" y="0" width="120" height="60" fill="#FDCB6E" rx="8" stroke="#fdcb6e" stroke-width="2" filter="url(#shadow)"/>
      <text x="60" y="25" text-anchor="middle" fill="#2d3436" font-size="14">🔮 LanceDB</text>
      <text x="60" y="45" text-anchor="middle" fill="#636e72" font-size="11">向量记忆</text>
    </g>

    <!-- 图数据库 -->
    <g transform="translate(280, 25)">
      <rect x="0" y="0" width="120" height="60" fill="#FDCB6E" rx="8" stroke="#fdcb6e" stroke-width="2" filter="url(#shadow)"/>
      <text x="60" y="25" text-anchor="middle" fill="#2d3436" font-size="14">🕸️ 图数据库</text>
      <text x="60" y="45" text-anchor="middle" fill="#636e72" font-size="11">关系网络</text>
    </g>

    <!-- 时间线 -->
    <g transform="translate(420, 25)">
      <rect x="0" y="0" width="120" height="60" fill="#FDCB6E" rx="8" stroke="#fdcb6e" stroke-width="2" filter="url(#shadow)"/>
      <text x="60" y="25" text-anchor="middle" fill="#2d3436" font-size="14">📅 时间线</text>
      <text x="60" y="45" text-anchor="middle" fill="#636e72" font-size="11">事件序列</text>
    </g>

    <!-- 多模态 -->
    <g transform="translate(560, 25)">
      <rect x="0" y="0" width="120" height="60" fill="#FDCB6E" rx="8" stroke="#fdcb6e" stroke-width="2" filter="url(#shadow)"/>
      <text x="60" y="25" text-anchor="middle" fill="#2d3436" font-size="14">🖼️ 多模态</text>
      <text x="60" y="45" text-anchor="middle" fill="#636e72" font-size="11">图文融合</text>
    </g>
  </g>

  <!-- 输出层 -->
  <g transform="translate(150, 520)">
    <text x="0" y="0" fill="#2d3436" font-size="18" font-weight="bold">📤 输出层</text>

    <!-- 上下文注入 -->
    <g transform="translate(0, 25)">
      <rect x="0" y="0" width="120" height="60" fill="#E17055" rx="8" stroke="#d63031" stroke-width="2" filter="url(#shadow)"/>
      <text x="60" y="25" text-anchor="middle" fill="white" font-size="14">📖 上下文注入</text>
      <text x="60" y="45" text-anchor="middle" fill="#dfe6e9" font-size="11">记忆召回</text>
    </g>

    <!-- 角色演化 -->
    <g transform="translate(140, 25)">
      <rect x="0" y="0" width="120" height="60" fill="#E17055" rx="8" stroke="#d63031" stroke-width="2" filter="url(#shadow)"/>
      <text x="60" y="25" text-anchor="middle" fill="white" font-size="14">🎭 角色演化</text>
      <text x="60" y="45" text-anchor="middle" fill="#dfe6e9" font-size="11">关系变化</text>
    </g>

    <!-- 剧情延续 -->
    <g transform="translate(280, 25)">
      <rect x="0" y="0" width="120" height="60" fill="#E17055" rx="8" stroke="#d63031" stroke-width="2" filter="url(#shadow)"/>
      <text x="60" y="25" text-anchor="middle" fill="white" font-size="14">🌐 剧情延续</text>
      <text x="60" y="45" text-anchor="middle" fill="#dfe6e9" font-size="11">因果延续</text>
    </g>

    <!-- 可视化管理 -->
    <g transform="translate(420, 25)">
      <rect x="0" y="0" width="120" height="60" fill="#E17055" rx="8" stroke="#d63031" stroke-width="2" filter="url(#shadow)"/>
      <text x="60" y="25" text-anchor="middle" fill="white" font-size="14">📊 可视化管理</text>
      <text x="60" y="45" text-anchor="middle" fill="#dfe6e9" font-size="11">Web界面</text>
    </g>

    <!-- 记忆召回 -->
    <g transform="translate(560, 25)">
      <rect x="0" y="0" width="120" height="60" fill="#E17055" rx="8" stroke="#d63031" stroke-width="2" filter="url(#shadow)"/>
      <text x="60" y="25" text-anchor="middle" fill="white" font-size="14">🔄 记忆召回</text>
      <text x="60" y="45" text-anchor="middle" fill="#dfe6e9" font-size="11">智能检索</text>
    </g>
  </g>

  <!-- 最终效果 -->
  <g transform="translate(600, 650)">
    <rect x="-200" y="-40" width="400" height="80" fill="#00B894" rx="15" filter="url(#shadow)"/>
    <text x="0" y="-10" text-anchor="middle" fill="white" font-size="20" font-weight="bold">✨ 下一轮副本 ✨</text>
    <text x="0" y="15" text-anchor="middle" fill="#55EFC4" font-size="14">不是重开新档，而是继续冒险</text>
  </g>

  <!-- 连接箭头 -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#636e72"/>
    </marker>
  </defs>

  <!-- 输入到核心 -->
  <line x1="450" y1="245" x2="450" y2="275" stroke="#636e72" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- 核心到存储 -->
  <line x1="450" y1="365" x2="450" y2="395" stroke="#636e72" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- 存储到输出 -->
  <line x1="450" y1="485" x2="450" y2="515" stroke="#636e72" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- 输出到结果 -->
  <line x1="450" y1="605" x2="450" y2="645" stroke="#636e72" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- 装饰性元素 -->
  <circle cx="100" cy="100" r="15" fill="#dfe6e9" opacity="0.5"/>
  <circle cx="1100" cy="100" r="20" fill="#dfe6e9" opacity="0.5"/>
  <circle cx="100" cy="700" r="25" fill="#dfe6e9" opacity="0.5"/>
  <circle cx="1100" cy="700" r="18" fill="#dfe6e9" opacity="0.5"/>
</svg>